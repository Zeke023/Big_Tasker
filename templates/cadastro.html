<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>

    <h1>Cadastro</h1>

    <form method="POST">

        <label>Nome:</label>
        <input type="text" name="nome">

        <br><br>

        <label>Email:</label>
        <input type="email" name="email">

        <br><br>

        <label>Senha:</label>
        <input type="password" name="senha">

        <br><br>

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <br>

    <a href="/">
        Voltar login
    </a>

</body>
</html>
